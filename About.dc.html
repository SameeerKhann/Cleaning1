<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0&display=block" rel="stylesheet">
  <style>
    *{box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{margin:0;background:#FFFFFF;}
    ::selection{background:#2563EB;color:#FFFFFF;}
    @keyframes kcGlow{0%,100%{box-shadow:0 0 22px rgba(37,99,235,0.4);}50%{box-shadow:0 0 36px rgba(37,99,235,0.8);}}
    [data-reveal],[data-reveal-stagger]{opacity:0;transform:translateY(40px);transition:opacity .7s cubic-bezier(.22,1,.36,1),transform .7s cubic-bezier(.22,1,.36,1);}
    @media (max-width:1024px){.kc-desktop-nav{display:none !important;}.kc-hamburger{display:flex !important;}}
    @media (min-width:1025px){.kc-hamburger{display:none !important;}.kc-mpanel{transform:translateX(110%) !important;}.kc-moverlay{opacity:0 !important;pointer-events:none !important;}}
    @media (max-width:880px){.kc-team-grid{grid-template-columns:repeat(2,1fr) !important;}}
    @media (max-width:520px){.kc-team-grid{grid-template-columns:1fr !important;}}
  </style>
  <script src="kc-reveal.js"></script>
</helmet>

<div ref="{{ rootRef }}" data-screen-label="About / Team" style="position:relative;min-height:100vh;background:transparent;color:#102A4C;font-family:Manrope,system-ui,sans-serif;overflow-x:hidden;">

  <div style="position:fixed;inset:0;z-index:-2;background-image:url('assets/sections-bg-c.jpg');background-size:cover;background-position:center;filter:blur(22px);transform:scale(1.08);"></div>
  <div style="position:fixed;inset:0;z-index:-1;background:rgba(244,247,251,0.86);"></div>
  <div style="position:absolute;top:-160px;right:-160px;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(37,99,235,0.12),transparent 65%);filter:blur(20px);pointer-events:none;"></div>

  <dc-import name="KidusNav" active="about" hint-size="100%,76px" style="position:fixed;top:0;left:0;right:0;z-index:60;"></dc-import>

  <section style="max-width:1220px;margin:0 auto;padding:140px clamp(16px,4vw,40px) 16px;">
    <div data-reveal="1" style="max-width:680px;">
      <a href="index.html" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:rgba(16,42,76,0.55);text-decoration:none;margin-bottom:16px;"><span style="font-family:'Material Symbols Outlined';font-size:16px;">arrow_back</span> Home</a>
      <span style="display:block;font-size:12.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#2563EB;">About us</span>
      <h1 style="font-family:Sora,sans-serif;font-weight:800;font-size:clamp(34px,5.4vw,58px);letter-spacing:-1.6px;line-height:1.04;margin:12px 0 16px;color:#102A4C;">Meet the team<br>behind your clean.</h1>
      <p style="font-size:clamp(15px,1.9vw,18px);line-height:1.65;color:rgba(16,42,76,0.7);margin:0;max-width:560px;">A trained, background-checked crew that treats every home and office like our own — eco-friendly products, careful hands, consistent results.</p>
    </div>
  </section>

  <section style="max-width:1220px;margin:0 auto;padding:16px clamp(16px,4vw,40px) 90px;">
    <div class="kc-team-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:22px;">
      <sc-for list="{{ team }}" as="m" hint-placeholder-count="6">
        <div data-reveal="1" style="border-radius:20px;overflow:hidden;background:#EFF4FB;border:1px solid rgba(16,42,76,0.08);transition:transform .3s ease,border-color .3s ease;" style-hover="transform:translateY(-4px);border-color:rgba(37,99,235,0.35);">
          <img src="{{ m.photo }}" alt="{{ m.name }}" style="width:100%;height:240px;object-fit:cover;display:block;"/>
          <div style="padding:16px 18px 20px;">
            <div style="font-family:Sora,sans-serif;font-weight:700;font-size:16px;color:#102A4C;">{{ m.name }}</div>
            <div style="font-size:13px;font-weight:600;color:#2563EB;margin-top:2px;">{{ m.role }}</div>
          </div>
        </div>
      </sc-for>
    </div>
  </section>

  <dc-import name="KidusFooter" hint-size="100%,360px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() {
    const start = () => {
      if (window.kcInitReveal) { this._revealCleanup = window.kcInitReveal(this._root); }
      else { this._revealRetry = setTimeout(start, 80); }
    };
    start();
  }
  componentWillUnmount() {
    clearTimeout(this._revealRetry);
    if (this._revealCleanup) this._revealCleanup();
  }
  renderVals() {
    return {
      rootRef: (el) => { this._root = el; },
      team: [
        { name: 'Team Member 1', role: 'Cleaning Specialist', photo: 'assets/team/p1.png' },
        { name: 'Team Member 2', role: 'Cleaning Specialist', photo: 'assets/team/p2.png' },
        { name: 'Team Member 3', role: 'Cleaning Specialist', photo: 'assets/team/p3.png' },
        { name: 'Team Member 4', role: 'Cleaning Specialist', photo: 'assets/team/p4.png' },
        { name: 'Team Member 5', role: 'Cleaning Specialist', photo: 'assets/team/p5.png' },
        { name: 'Team Member 6', role: 'Cleaning Specialist', photo: 'assets/team/p6.png' },
      ],
    };
  }
}
</script>
</body>
</html>
