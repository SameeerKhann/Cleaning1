<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0&display=block" rel="stylesheet">
  <style>
    *{box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{margin:0;background:#FFFFFF;}
    ::selection{background:#2563EB;color:#FFFFFF;}
    select,input,textarea{appearance:none;-webkit-appearance:none;font-family:Manrope,sans-serif;}
    input::placeholder,textarea::placeholder{color:rgba(16,42,76,0.4);}
    @keyframes kcGlow{0%,100%{box-shadow:0 0 22px rgba(37,99,235,0.4);}50%{box-shadow:0 0 36px rgba(37,99,235,0.8);}}
    @keyframes kcReveal{from{opacity:0;transform:translateY(42px) scale(.985);}to{opacity:1;transform:none;}}
    [data-reveal],[data-reveal-stagger]{opacity:0;transform:translateY(40px);transition:opacity .7s cubic-bezier(.22,1,.36,1),transform .7s cubic-bezier(.22,1,.36,1);}
    @media (max-width:1024px){.kc-desktop-nav{display:none !important;}.kc-hamburger{display:flex !important;}}
    @media (min-width:1025px){.kc-hamburger{display:none !important;}.kc-mpanel{transform:translateX(110%) !important;}.kc-moverlay{opacity:0 !important;pointer-events:none !important;}}
    @media (max-width:880px){.kc-contact-grid{grid-template-columns:1fr !important;}}
  </style>
  <script src="kc-reveal.js"></script>
</helmet>

<div ref="{{ rootRef }}" data-screen-label="Contact" style="position:relative;min-height:100vh;background:transparent;color:#102A4C;font-family:Manrope,system-ui,sans-serif;overflow-x:hidden;">

  <div style="position:fixed;inset:0;z-index:-2;background-image:url('assets/sections-bg-c.jpg');background-size:cover;background-position:center;filter:blur(22px);transform:scale(1.08);"></div>
  <div style="position:fixed;inset:0;z-index:-1;background:rgba(244,247,251,0.86);"></div>
  <div style="position:absolute;top:-160px;right:-160px;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(37,99,235,0.12),transparent 65%);filter:blur(20px);pointer-events:none;"></div>

  <dc-import name="KidusNav" active="contact" hint-size="100%,76px" style="position:fixed;top:0;left:0;right:0;z-index:60;"></dc-import>

  <section style="max-width:1220px;margin:0 auto;padding:140px clamp(16px,4vw,40px) 16px;">
    <div data-reveal="1" style="max-width:680px;">
      <a href="index.html" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:rgba(16,42,76,0.55);text-decoration:none;margin-bottom:16px;"><span style="font-family:'Material Symbols Outlined';font-size:16px;">arrow_back</span> Home</a>
      <span style="display:block;font-size:12.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#2563EB;">Get in touch</span>
      <h1 style="font-family:Sora,sans-serif;font-weight:800;font-size:clamp(34px,5.4vw,58px);letter-spacing:-1.6px;line-height:1.04;margin:12px 0 16px;color:#102A4C;">Let's book your<br>sparkling clean.</h1>
      <p style="font-size:clamp(15px,1.9vw,18px);line-height:1.65;color:rgba(16,42,76,0.7);margin:0;max-width:540px;">Tell us about your space and we'll get back with instant, transparent pricing — usually within a few hours.</p>
    </div>
  </section>

  <section style="max-width:1220px;margin:0 auto;padding:16px clamp(16px,4vw,40px) 24px;">
    <div class="kc-contact-grid" style="display:grid;grid-template-columns:1.2fr 0.8fr;gap:18px;align-items:start;">

      <!-- FORM -->
      <form onSubmit="{{ onSubmit }}" data-reveal="1" style="padding:clamp(24px,3vw,36px);border-radius:22px;background:#EFF4FB;border:1px solid rgba(16,42,76,0.08);">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
          <label style="display:flex;flex-direction:column;gap:6px;">
            <span style="font-size:12px;font-weight:600;letter-spacing:0.3px;text-transform:uppercase;color:rgba(16,42,76,0.55);">Full name</span>
            <input type="text" placeholder="Jane Doe" style="{{ inputStyle }}"/>
          </label>
          <label style="display:flex;flex-direction:column;gap:6px;">
            <span style="font-size:12px;font-weight:600;letter-spacing:0.3px;text-transform:uppercase;color:rgba(16,42,76,0.55);">Phone</span>
            <input type="tel" placeholder="587-000-0000" style="{{ inputStyle }}"/>
          </label>
          <label style="display:flex;flex-direction:column;gap:6px;grid-column:1 / -1;">
            <span style="font-size:12px;font-weight:600;letter-spacing:0.3px;text-transform:uppercase;color:rgba(16,42,76,0.55);">Email</span>
            <input type="email" placeholder="jane@email.com" style="{{ inputStyle }}"/>
          </label>
          <label style="display:flex;flex-direction:column;gap:6px;">
            <span style="font-size:12px;font-weight:600;letter-spacing:0.3px;text-transform:uppercase;color:rgba(16,42,76,0.55);">Service</span>
            <div style="position:relative;">
              <select style="{{ selectStyle }}">
                <option>Deep / Initial Clean</option><option>Recurring Clean</option><option>Move-In / Move-Out</option><option>Vacation Rental / Airbnb</option><option>Office / Commercial</option><option>Other</option>
              </select>
              <span style="position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:9px;color:rgba(16,42,76,0.5);pointer-events:none;">▼</span>
            </div>
          </label>
          <label style="display:flex;flex-direction:column;gap:6px;">
            <span style="font-size:12px;font-weight:600;letter-spacing:0.3px;text-transform:uppercase;color:rgba(16,42,76,0.55);">Property size</span>
            <div style="position:relative;">
              <select style="{{ selectStyle }}">
                <option>Studio / 1 bedroom</option><option>2 bedrooms</option><option>3 bedrooms</option><option>4+ bedrooms</option><option>Office / Commercial</option>
              </select>
              <span style="position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:9px;color:rgba(16,42,76,0.5);pointer-events:none;">▼</span>
            </div>
          </label>
          <label style="display:flex;flex-direction:column;gap:6px;grid-column:1 / -1;">
            <span style="font-size:12px;font-weight:600;letter-spacing:0.3px;text-transform:uppercase;color:rgba(16,42,76,0.55);">Anything we should know?</span>
            <textarea rows="4" placeholder="Pets, parking, focus areas, preferred dates…" style="{{ inputStyle }}"></textarea>
          </label>
        </div>
        <button type="submit" style="margin-top:18px;width:100%;display:inline-flex;align-items:center;justify-content:center;gap:9px;padding:16px;border-radius:13px;border:none;cursor:pointer;background:#2563EB;color:#FFFFFF;font-family:Sora,sans-serif;font-weight:700;font-size:16px;animation:kcGlow 2.6s ease-in-out infinite;">{{ submitLabel }} <span style="font-size:18px;">→</span></button>
        <p style="text-align:center;font-size:12.5px;color:rgba(16,42,76,0.45);margin:14px 0 0;">{{ formNote }}</p>
      </form>

      <!-- INFO -->
      <div style="display:flex;flex-direction:column;gap:14px;">
        <sc-for list="{{ contacts }}" as="c" hint-placeholder-count="4">
          <a href="{{ c.href }}" data-reveal="1" style="display:flex;align-items:center;gap:14px;padding:20px;border-radius:18px;background:#EFF4FB;border:1px solid rgba(16,42,76,0.08);text-decoration:none;transition:transform .3s ease,border-color .3s ease;" style-hover="transform:translateY(-4px);border-color:rgba(37,99,235,0.4);">
            <span style="display:flex;align-items:center;justify-content:center;width:46px;height:46px;border-radius:13px;background:rgba(37,99,235,0.12);border:1px solid rgba(37,99,235,0.28);font-family:'Material Symbols Outlined';font-size:23px;color:#2563EB;flex-shrink:0;">{{ c.icon }}</span>
            <div><div style="font-size:11.5px;font-weight:600;letter-spacing:0.3px;text-transform:uppercase;color:rgba(16,42,76,0.5);">{{ c.label }}</div><div style="font-family:Sora,sans-serif;font-weight:700;font-size:15px;color:#102A4C;margin-top:3px;">{{ c.value }}</div></div>
          </a>
        </sc-for>
        <div data-reveal="1" style="padding:20px;border-radius:18px;background:linear-gradient(135deg,#DCE8F8,#EFF4FB);border:1px solid rgba(37,99,235,0.2);">
          <div style="display:flex;align-items:center;gap:9px;margin-bottom:8px;"><span style="font-family:'Material Symbols Outlined';color:#2563EB;">schedule</span><span style="font-family:Sora,sans-serif;font-weight:700;font-size:15px;color:#102A4C;">Hours</span></div>
          <p style="margin:0;font-size:13.5px;line-height:1.6;color:rgba(16,42,76,0.7);">Mon–Sat · 8:00 AM – 7:00 PM<br>Sunday · By appointment</p>
        </div>
      </div>
    </div>
  </section>

  <dc-import name="KidusFooter" hint-size="100%,360px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { sent: false };
  componentDidMount() {
    const start = () => {
      if (window.kcInitReveal) { this._revealCleanup = window.kcInitReveal(this._root); }
      else { this._revealRetry = setTimeout(start, 80); }
    };
    start();
  }
  componentWillUnmount() {
    clearTimeout(this._revealRetry);
    if (this._revealCleanup) this._revealCleanup();
  }
  renderVals() {
    const inputStyle = 'width:100%;padding:13px 14px;border-radius:11px;background:rgba(255,255,255,0.7);border:1px solid rgba(16,42,76,0.14);color:#102A4C;font-size:14.5px;font-weight:500;outline:none;resize:vertical;';
    return {
      rootRef: (el) => { this._root = el; },
      inputStyle,
      selectStyle: inputStyle + 'cursor:pointer;padding-right:32px;',
      submitLabel: this.state.sent ? 'Request sent — we\u2019ll be in touch!' : 'Request my free quote',
      formNote: 'Prefer to talk? Call 587-713-0909 for instant pricing.',
      onSubmit: (e) => { e.preventDefault(); this.setState({ sent: true }); },
      contacts: [
        { icon: 'call', label: 'Call or text', value: '587-713-0909 · 587-778-7372', href: 'tel:5877130909' },
        { icon: 'mail', label: 'Email', value: 'info@kidusclean.com', href: 'mailto:info@kidusclean.com' },
        { icon: 'bolt', label: 'Instant online quote', value: 'Book in under a minute', href: 'https://kidusclean.com/quoteonline.php' },
        { icon: 'location_on', label: 'Service area', value: 'Edmonton, Calgary & Greater Edmonton area', href: 'index.html#areas' },
      ],
    };
  }
}
</script>
</body>
</html>
