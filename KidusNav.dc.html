<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<header style="width:100%;padding:18px clamp(16px,4vw,40px);">
  <div ref="{{ headerRef }}" style="max-width:1220px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:11px 13px 11px 20px;border-radius:18px;border:1px solid transparent;transition:background .35s ease,box-shadow .35s ease,border-color .35s ease,backdrop-filter .35s ease;">

    <a href="Kidus%20Cleaning.dc.html" style="display:flex;align-items:center;text-decoration:none;flex-shrink:0;">
      <img src="assets/kidus-logo-new.png" alt="Kidus Clean" style="height:40px;width:auto;display:block;"/>
    </a>

    <nav class="kc-desktop-nav" style="display:flex;align-items:center;gap:2px;">
      <sc-for list="{{ navItems }}" as="n" hint-placeholder-count="5">
        <a href="{{ n.href }}" style="{{ n.style }}" style-hover="background:rgba(16,42,76,0.06);">{{ n.label }}</a>
      </sc-for>
    </nav>

    <div style="display:flex;align-items:center;gap:9px;flex-shrink:0;">
      <a href="tel:5877130909" class="kc-desktop-nav" style="display:inline-flex;align-items:center;gap:7px;padding:10px 14px;border-radius:12px;background:rgba(16,42,76,0.06);border:1px solid rgba(16,42,76,0.12);color:#102A4C;font-size:13.5px;font-weight:600;text-decoration:none;transition:background .2s ease;" style-hover="background:rgba(16,42,76,0.12);"><span style="font-family:'Material Symbols Outlined';font-size:17px;">call</span> 587-713-0909</a>
      <a href="https://kidusclean.com/quoteonline.php" target="_blank" class="kc-desktop-nav" style="display:inline-flex;align-items:center;gap:8px;padding:11px 18px;border-radius:12px;background:#2563EB;color:#FFFFFF;font-family:Sora,sans-serif;font-weight:700;font-size:13.5px;text-decoration:none;letter-spacing:0.2px;animation:kcGlow 2.8s ease-in-out infinite;transition:transform .2s ease;" style-hover="transform:translateY(-2px) scale(1.03);">Instant Quote <span style="font-size:15px;line-height:1;">→</span></a>
      <button class="kc-hamburger" onClick="{{ toggleMobile }}" aria-label="Menu" style="display:none;align-items:center;justify-content:center;width:44px;height:44px;border-radius:12px;background:rgba(16,42,76,0.08);border:1px solid rgba(16,42,76,0.14);color:#102A4C;cursor:pointer;flex-direction:column;gap:5px;">
        <span style="width:18px;height:2px;background:#102A4C;border-radius:2px;"></span>
        <span style="width:18px;height:2px;background:#102A4C;border-radius:2px;"></span>
        <span style="width:12px;height:2px;background:#2563EB;border-radius:2px;"></span>
      </button>
    </div>
  </div>

  <div class="kc-moverlay" onClick="{{ closeMobile }}" style="{{ overlayStyle }}"></div>
  <aside class="kc-mpanel" style="{{ mobilePanelStyle }}">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;">
      <span style="font-family:Sora,sans-serif;font-weight:800;font-size:18px;color:#102A4C;">Menu</span>
      <button onClick="{{ closeMobile }}" aria-label="Close" style="width:40px;height:40px;border-radius:11px;background:rgba(16,42,76,0.06);border:1px solid rgba(16,42,76,0.12);color:#102A4C;font-size:18px;cursor:pointer;">✕</button>
    </div>
    <nav style="display:flex;flex-direction:column;gap:4px;">
      <sc-for list="{{ mNav }}" as="n" hint-placeholder-count="5">
        <a href="{{ n.href }}" onClick="{{ closeMobile }}" style="{{ n.style }}" style-hover="background:rgba(37,99,235,0.12);">{{ n.label }}</a>
      </sc-for>
    </nav>
    <a href="tel:5877130909" style="margin-top:14px;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:13px;background:rgba(16,42,76,0.06);border:1px solid rgba(16,42,76,0.14);color:#102A4C;font-weight:600;font-size:15px;text-decoration:none;"><span style="font-family:'Material Symbols Outlined';font-size:18px;">call</span> 587-713-0909</a>
    <a href="https://kidusclean.com/quoteonline.php" target="_blank" onClick="{{ closeMobile }}" style="margin-top:10px;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:15px;border-radius:13px;background:#2563EB;color:#FFFFFF;font-family:Sora,sans-serif;font-weight:700;font-size:15.5px;text-decoration:none;animation:kcGlow 2.6s ease-in-out infinite;">Instant Quote →</a>
  </aside>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1220,&quot;height&quot;:90},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;services&quot;,&quot;checklist&quot;,&quot;about&quot;,&quot;contact&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;transparent&quot;:{&quot;editor&quot;:null,&quot;default&quot;:null,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { mobile: false };

  componentDidMount() {
    const h = this._header;
    if (!h) return;
    if (this.props.transparent) {
      const findScroller = () => {
        let el = h.parentElement;
        while (el && el !== document.body && el !== document.documentElement) {
          const oy = getComputedStyle(el).overflowY;
          if ((oy === 'auto' || oy === 'scroll') && el.scrollHeight > el.clientHeight + 4) return el;
          el = el.parentElement;
        }
        return null;
      };
      this._scroller = findScroller();
      this._onScroll = () => {
        const top = this._scroller ? this._scroller.scrollTop : (window.scrollY || window.pageYOffset || 0);
        const s = top > 24;
        h.style.background = s ? 'rgba(255,255,255,0.82)' : 'transparent';
        h.style.backdropFilter = s ? 'blur(14px)' : 'none';
        h.style.webkitBackdropFilter = s ? 'blur(14px)' : 'none';
        h.style.boxShadow = s ? '0 14px 40px rgba(15,30,60,0.16)' : 'none';
        h.style.borderColor = s ? 'rgba(16,42,76,0.08)' : 'transparent';
      };
      window.addEventListener('scroll', this._onScroll, { passive: true });
      if (this._scroller) this._scroller.addEventListener('scroll', this._onScroll, { passive: true });
      this._onScroll();
    } else {
      h.style.background = 'rgba(255,255,255,0.92)';
      h.style.backdropFilter = 'blur(14px)';
      h.style.webkitBackdropFilter = 'blur(14px)';
      h.style.boxShadow = '0 12px 34px rgba(15,30,60,0.13)';
      h.style.borderColor = 'rgba(16,42,76,0.08)';
    }
  }

  componentWillUnmount() {
    if (this._onScroll) {
      window.removeEventListener('scroll', this._onScroll);
      if (this._scroller) this._scroller.removeEventListener('scroll', this._onScroll);
    }
  }

  renderVals() {
    const active = this.props.active;
    const NAV = [
      { k: 'home', label: 'Home', href: 'index.html' },
      { k: 'services', label: 'Services', href: 'Services.dc.html' },
      { k: 'checklist', label: "What's Included", href: 'Checklist.dc.html' },
      { k: 'about', label: 'About', href: 'index.html#about' },
      { k: 'contact', label: 'Contact', href: 'Contact.dc.html' },
    ];
    const linkStyle = (on) => 'display:inline-flex;align-items:center;padding:9px 13px;border-radius:11px;text-decoration:none;font-size:14px;font-weight:600;transition:color .2s ease,background .2s ease;color:' + (on ? '#2563EB' : 'rgba(16,42,76,0.82)') + ';';
    const mLink = (on) => 'padding:13px 14px;border-radius:12px;text-decoration:none;font-family:Sora,sans-serif;font-weight:600;font-size:16px;transition:background .2s ease;color:' + (on ? '#2563EB' : '#102A4C') + ';';
    return {
      headerRef: (el) => { this._header = el; },
      navItems: NAV.map((n) => ({ label: n.label, href: n.href, style: linkStyle(active === n.k) })),
      mNav: NAV.map((n) => ({ label: n.label, href: n.href, style: mLink(active === n.k) })),
      toggleMobile: () => this.setState((s) => ({ mobile: !s.mobile })),
      closeMobile: () => this.setState({ mobile: false }),
      mobilePanelStyle: 'position:fixed;top:0;right:0;bottom:0;z-index:90;width:min(86vw,340px);padding:22px;display:flex;flex-direction:column;background:rgba(255,255,255,0.98);backdrop-filter:blur(20px);border-left:1px solid rgba(16,42,76,0.1);box-shadow:-20px 0 60px rgba(0,0,0,0.5);transition:transform .42s cubic-bezier(.22,1,.36,1);transform:translateX(' + (this.state.mobile ? '0' : '110%') + ');',
      overlayStyle: 'position:fixed;inset:0;z-index:85;background:rgba(15,30,60,0.6);backdrop-filter:blur(3px);transition:opacity .35s ease;opacity:' + (this.state.mobile ? '1' : '0') + ';pointer-events:' + (this.state.mobile ? 'auto' : 'none') + ';',
    };
  }
}
</script>
</body>
</html>
